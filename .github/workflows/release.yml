name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build aarch64
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/termini \
            target/x86_64-apple-darwin/release/termini \
            -output dist/termini
          lipo -archs dist/termini

      - name: Package
        run: |
          cd dist
          VERSION="${GITHUB_REF_NAME}"
          TARBALL="termini-${VERSION}-macos-universal.tar.gz"
          tar -czf "${TARBALL}" termini
          shasum -a 256 "${TARBALL}" > "${TARBALL}.sha256"
          echo "TARBALL=${TARBALL}" >> "${GITHUB_ENV}"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/${{ env.TARBALL }}
            dist/${{ env.TARBALL }}.sha256
